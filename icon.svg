  <!-- Clip superior -->
  <rect x="192" y="108" width="128" height="72" rx="14" fill="#1e40af"/>
  <rect x="208" y="120" width="96" height="48" rx="10" fill="#3b82f6"/>

  <!-- Línea título -->
