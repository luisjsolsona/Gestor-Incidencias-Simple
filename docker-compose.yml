services:
  incidencias:
    build: .
    container_name: gestor-incidencias
    restart: unless-stopped
    ports:
      - "7000:3000"
    volumes:
      - incidencias_data:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=cambia_este_secreto_en_produccion
      - TZ=Europe/Madrid
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  incidencias_data:
    driver: local

x-casaos:
  main: incidencias
  title:
    en_us: Gestor Incidencias
  tagline:
    en_us: Gestión de incidencias para centros educativos
  description:
    en_us: >
      App web para registrar y gestionar incidencias técnicas en centros educativos.
      Incluye formulario público, panel de gestión con roles (admin/cofotap/usuario),
      historial de cambios, editor WYSIWYG, adjuntos/fotos y Docker-ready.
  icon: https://raw.githubusercontent.com/luisjsolsona/Gestor-Incidencias-Simple/main/icon.png
  architectures:
    - amd64
    - arm64
  category: utilities
  port_map: "7000"
  scheme: http
  index: /
